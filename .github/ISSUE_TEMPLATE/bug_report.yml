name: Bug report
description: Report a bug in the Fandom Graph
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: The URL where the bug occurred (e.g. https://topshot.world/fandom?player=LeBron+James)
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - Mobile (iOS)
        - Mobile (Android)
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop a screenshot if helpful
